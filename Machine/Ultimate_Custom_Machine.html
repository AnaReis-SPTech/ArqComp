<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Custom Machine</title>
</head>

<body>
    <div class="principal">
        <img src="custom.png" alt="Custom">
        <h1> Ultimate Custom Machine </h1>
    </div>
    <div class="container">
        <h3>Qual opção você escolhe?</h3>
        <button onclick="operacoes()"> Operações </button>
        <Button onclick="unitaria()"> Conversão Unitária </Button>
    </div>
</body>
<script> 

    function operacoes() {
        document.querySelector('.container').innerHTML = `
        <p class = "esquerda">Faça sua operação: </p>
        <div class="operacoes">
            <div>
                <input type="number" id="id_n1">
                <select id="id_baseN1">
                    <option value="2">Binario</option>
                    <option value="8">Octal</option>
                    <option value="10">Decimal</option>
                    <option value="16">Hexadecimal</option>
                </select> 
            </div>
            <select id="id_operacao">
                <option value="+">+</option>
                <option value="-">-</option>
                <option value="*">×</option>
                <option value="/">÷</option>
            </select>
            <div>
                <input type="text" id="id_n2">
                <select id="id_baseN2">
                    <option value="2">Binario</option>
                    <option value="8">Octal</option>
                    <option value="10">Decimal</option>
                    <option value="16">Hexadecimal</option>
                </select>   
            </div>
            
        </div>
        <label for="id_base_conversao" class = "esquerda">Escolha a base de conversão: </label>
        <select name="base_resultado" id="id_base_conversao">
            <option value="10">Decimal</option>
            <option value="2">Binario</option>
            <option value="8">Octal</option>
            <option value="16">Hexadecimal</option>
        </select>
        <p id="id_mensagem"></p>
        <button onclick="calcular()"> Converter </button>
        <button onclick="location.reload();" class="button_back"> < </button>
        `;
    }


    function unitaria() {
        
        document.querySelector('.container').innerHTML = `
        <p class="esquerda">Converta seu número: </p>
        <input type="text" id="id_num">
        <select id="id_base">
            <option value="2">Binario</option>
            <option value="8">Octal</option>
            <option value="10">Decimal</option>
            <option value="16">Hexadecimal</option>
        </select>
        <label for="id_base_preferencia" class="esquerda">Escolha a base de conversão: </label>
        <select id="id_base_preferencia">
            <option value="20">Todos</option>
            <option value="10">Decimal</option>
            <option value="2">Binário</option>
            <option value="16">Hexadecimal</option>
            <option value="8">Octal</option>
        </select>
        <div id="resultado"></div>
        <button onclick="converter()"> Converter </button>
        <button onclick="location.reload();" class="button_back"> < </button>
        `
    }

    function calcular() {
        let n1 = id_n1.value;
        let n2 = id_n2.value;
        let baseN1 = id_baseN1.value;
        let baseN2 = id_baseN2.value;
        let operacao = id_operacao.value;
        let base_conversao = id_base_conversao.value;
        let valorN1;
        let valorN2;

        if (baseN1 == 2 || baseN1 == 8 || baseN1 == 16 || baseN1 == 10 || baseN2 == 2 || baseN2 == 8 || baseN2 == 16 || baseN2 == 10) {
            valorN1 = parseInt(n1, baseN1).toString(10);
            valorN2 = parseInt(n2, baseN2).toString(10);
        } else {
            alert("Valor ou base inválidos!");
        }

        if (operacao == "+") {
            resultado = Number(valorN1) + Number(valorN2);
        } else if (operacao == "-") {
            resultado = Number(valorN1) - Number(valorN2);
        } else if (operacao == "*") {
            resultado = Number(valorN1) * Number(valorN2);
        } else if (operacao == "/") {
            resultado = Number(valorN1) / Number(valorN2);
        }

        convertido = parseInt(resultado, 10).toString(base_conversao);

        if (convertido == "NaN") {
            alert(`Valores inválidos! \nTente novamente.`);
            location.reload()
            return
        };


        id_mensagem.innerHTML = `<b>Resultado: </b>${convertido}.`;
    }

    function converter() {
        let num = id_num.value;
        let base = id_base.value;
        let base_pref = id_base_preferencia.value;
        let convertido;
        let binario;
        let octal;
        let hexadecimal;
        let decimal;

        if (num.indexOf(8,9) && base == 8) {
            alert(`Valor OCTAL inválido! \nTente novamente.`);
            location.reload()
            return
        }

        if (base == 2 || base == 8 || base == 16 || base == 10) {

            convertido = parseInt(num, base).toString(base_pref);
            resultado.innerHTML = `
            Você converteu ${num} da base ${base} para a base ${base_pref}.
            <br>
            <b>${convertido}</b>`;

        } else {

            alert("Valor ou base inválidos!");

        }
        
        
        if (base_pref == 20) {

            binario = parseInt(num, base).toString(2);
            octal = parseInt(num, base).toString(8);
            hexadecimal = parseInt(num, base).toString(16);
            decimal = parseInt(num, base).toString(10);

            resultado.innerHTML = `
            <b>BINÁRIO: </b> ${binario}<br>
            <b>OCTAL: </b> ${octal}<br>
            <b>DECIMAL: </b> ${decimal}<br>
            <b>HEXADECIMAL: </b> ${hexadecimal}
            `;

        } 
        
        
    }
</script>
