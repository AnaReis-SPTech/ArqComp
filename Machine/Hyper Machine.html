<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Raleway:ital,wght@0,100..900;1,100..900&family=SN+Pro:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
    <title>Hyper Machine</title>
</head>

<body>
    <h1>Hyper Machine</h1>
    <div class="container">

        <h3>Digite um número decimal:</h3>

        <input id="demo1" type="text" placeholder="Ex: 42">
        <br>
        <button onclick="converter()">Converter</button>
        <div class="content-resultados">
            <p>Octal:
            <div id="demo2"></div>
            </p>
            <p>Hexadecimal:
            <div id="demo3"></div>
            </p>
            <p>Binário:
            <div id="demo4"></div>
            </p>    
        </div>
        
    </div>
</body>
<script>
    function converter() {
        var decimal = Number(demo1.value);

        demo2.innerHTML = decimal.toString(8);
        demo3.innerHTML = decimal.toString(16);
        demo4.innerHTML = decimal.toString(2);
    }
</script>
</html>
